<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <title>Analytics Dashboard</title>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-4xl mx-auto bg-slate-800 p-6 rounded-xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-6">Analytics Real-Time</h1>
        <canvas id="browserChart" class="mb-6"></canvas>
        <button onclick="trackEvent()" class="bg-blue-600 px-6 py-2 rounded-lg hover:bg-blue-500 transition">🔵 Invia Clic</button>
    </div>

    <script>
        // Configura il grafico
        const ctx = document.getElementById('browserChart').getContext('2d');
        const chart = new Chart(ctx, { 
            type: 'bar', 
            data: { labels: ['Chrome', 'Firefox', 'Other'], datasets: [{ label: 'Clic', data: [0, 0, 0], backgroundColor: '#3b82f6' }] } 
        });

        function trackEvent() {
            fetch('/api/v1/analytics/events', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: 'Click', userAgent: navigator.userAgent }) });
        }

        // Ascolta l'evento dal server
        const socket = io();
        socket.on('event-queued', (event) => {
            const idx = chart.data.labels.indexOf(event.browser);
            if (idx !== -1) { chart.data.datasets[0].data[idx] += 1; chart.update(); }
        });
    </script>
</body>
</html>
